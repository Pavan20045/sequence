<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sequence — Online Board Game</title>
  <meta name="description" content="Play the classic Sequence board game online with friends. Create a room, share the link, and enjoy!">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <!-- ========== LOBBY VIEW ========== -->
  <div id="lobby-view" class="view active">
    <div class="bg-particles" id="bg-particles"></div>
    <div class="lobby-container">
      <div class="logo-section">
        <div class="logo-icon">
          <span class="logo-card c1">♠</span>
          <span class="logo-card c2">♥</span>
          <span class="logo-card c3">♦</span>
          <span class="logo-card c4">♣</span>
        </div>
        <h1 class="logo-title">SEQUENCE</h1>
        <p class="logo-sub">The Classic Board Game — Now Online</p>
      </div>
      <div class="lobby-card glass-panel">
        <div class="input-group">
          <input type="text" id="player-name" placeholder="Your Name" maxlength="15" autocomplete="off">
        </div>
        <button id="create-btn" class="btn btn-primary">
          <span class="btn-icon">✦</span> Create Game
        </button>
        <div class="divider"><span>OR JOIN A GAME</span></div>
        <div class="join-row">
          <input type="text" id="room-code-input" placeholder="ROOM CODE" maxlength="6" autocomplete="off" style="text-transform:uppercase">
          <button id="join-btn" class="btn btn-secondary">Join</button>
        </div>
      </div>
    </div>
  </div>

  <!-- ========== WAITING ROOM VIEW ========== -->
  <div id="waiting-view" class="view">
    <div class="bg-particles" id="bg-particles-2"></div>
    <div class="waiting-container">
      <div class="waiting-header">
        <h2>Game Lobby</h2>
      </div>
      <div class="room-info glass-panel">
        <p class="room-label">Room Code</p>
        <div class="room-code-display">
          <span id="display-room-code">------</span>
          <button id="copy-code-btn" class="copy-btn" title="Copy code">📋</button>
        </div>
        <div class="share-section">
          <input type="text" id="share-link" readonly class="share-input">
          <button id="copy-link-btn" class="btn btn-small">Copy Link</button>
        </div>
      </div>
      <div class="team-selection glass-panel">
        <h3>Choose Your Team</h3>
        <div class="team-buttons">
          <button class="team-btn team-blue" data-team="0">
            <span class="team-chip"></span> Blue Team
          </button>
          <button class="team-btn team-green" data-team="1">
            <span class="team-chip"></span> Green Team
          </button>
          <button class="team-btn team-red" data-team="2">
            <span class="team-chip"></span> Red Team
          </button>
        </div>
      </div>
      <div class="players-panel glass-panel">
        <h3>Players <span id="player-count" class="badge">0</span></h3>
        <ul id="player-list"></ul>
      </div>
      <button id="start-btn" class="btn btn-primary btn-large" style="display:none">
        🎮 Start Game
      </button>
    </div>
  </div>

  <!-- ========== SHUFFLE ANIMATION OVERLAY ========== -->
  <div id="shuffle-overlay" class="overlay">
    <div id="shuffle-container"></div>
    <div id="shuffle-text"></div>
  </div>

  <!-- ========== GAME VIEW ========== -->
  <div id="game-view" class="view">
    <div class="game-layout">
      <div class="game-top-bar">
        <div class="top-logo">SEQUENCE</div>
        <div class="turn-indicator" id="turn-indicator">
          <span id="turn-text">Waiting...</span>
        </div>
        <div class="top-room">Room: <span id="game-room-code"></span></div>
      </div>
      <div class="game-main">
        <div class="board-wrapper">
          <div class="board-felt">
            <div id="game-board" class="board-grid"></div>
          </div>
        </div>
        <div class="game-sidebar">
          <div class="team-scores glass-panel">
            <h3>Sequences</h3>
            <div id="team-scores"></div>
          </div>
          <div class="players-sidebar glass-panel">
            <h3>Players</h3>
            <ul id="game-player-list"></ul>
          </div>
          <div class="game-log-panel glass-panel">
            <h3>Game Log</h3>
            <div id="game-log"></div>
          </div>
        </div>
      </div>
      <div class="hand-area">
        <div class="hand-label">Your Hand</div>
        <div id="player-hand" class="hand-cards"></div>
        <div id="hand-hint" class="hand-hint"></div>
      </div>
    </div>
  </div>

  <!-- ========== GAME OVER OVERLAY ========== -->
  <div id="gameover-overlay" class="overlay">
    <div class="gameover-content glass-panel">
      <div class="confetti-container" id="confetti"></div>
      <h1 id="winner-text">🎉 Team Wins! 🎉</h1>
      <p id="winner-detail"></p>
      <button id="play-again-btn" class="btn btn-primary btn-large">🔄 Play Again</button>
    </div>
  </div>

  <!-- ========== TOAST ========== -->
  <div id="toast-container"></div>

  <script src="/socket.io/socket.io.js"></script>
  <script src="/js/app.js"></script>
</body>
</html>
